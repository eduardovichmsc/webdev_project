<div class="flex min-h-screen bg-[#faf9f6]">
  <!-- Left decorative panel -->
  <div
    class="relative hidden md:block w-1/2 shrink-0 bg-cover bg-center"
    style="
      background-image: url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=1400&auto=format&fit=crop');
    "
  >
    <div class="absolute inset-0 bg-gradient-to-b from-black/55 to-black/25"></div>
    <div class="relative z-10 h-full flex flex-col justify-between p-10">
      <a routerLink="/" class="font-source text-2xl italic text-white tracking-wide">simuero</a>
      <div class="flex flex-col gap-5">
        <p class="font-serif text-2xl italic leading-snug text-white/90">
          "Crafted with devotion,<br />worn with grace."
        </p>
        <span class="block w-12 h-px bg-white/40"></span>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="flex flex-1 items-center justify-center px-6 py-10">
    <div class="w-full max-w-[400px] flex flex-col gap-7">
      <!-- Mobile logo -->
      <a routerLink="/" class="font-source text-2xl italic text-neutral-900 md:hidden">simuero</a>

      <!-- Header -->
      <div class="flex flex-col gap-1">
        <h1 class="font-serif text-3xl font-medium text-neutral-900 tracking-tight">
          Welcome back
        </h1>
        <p class="text-sm text-neutral-500">Sign in to your account</p>
      </div>

      <!-- Form -->
      <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <!-- Error -->
        @if (errorMessage()) {
          <div
            id="login-error-banner"
            class="flex items-center gap-2.5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm animate-fade-up"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              class="shrink-0"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <!-- Username -->
        <div class="flex flex-col gap-1.5">
          <label
            class="text-[11px] font-semibold uppercase tracking-widest text-neutral-500"
            for="login-username"
            >Username</label
          >
          <input
            id="login-username"
            name="username"
            type="text"
            class="w-full border border-neutral-300 rounded-lg px-4 py-3 text-sm text-neutral-900 bg-white outline-none transition focus:border-neutral-900 focus:shadow-[0_0_0_3px_rgba(26,26,26,0.06)] placeholder:text-neutral-300"
            placeholder="your_username"
            autocomplete="username"
            [(ngModel)]="form.username"
            required
          />
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1.5">
          <label
            class="text-[11px] font-semibold uppercase tracking-widest text-neutral-500"
            for="login-password"
            >Password</label
          >
          <div class="relative">
            <input
              id="login-password"
              name="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="w-full border border-neutral-300 rounded-lg px-4 py-3 pr-12 text-sm text-neutral-900 bg-white outline-none transition focus:border-neutral-900 focus:shadow-[0_0_0_3px_rgba(26,26,26,0.06)] placeholder:text-neutral-300"
              placeholder="••••••••"
              autocomplete="current-password"
              [(ngModel)]="form.password"
              required
            />
            <button
              type="button"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-800 transition"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            >
              @if (showPassword()) {
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
                  />
                  <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              } @else {
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          id="login-submit-btn"
          type="submit"
          class="flex items-center justify-center gap-2 w-full py-3 px-6 mt-1 bg-neutral-900 text-white text-sm font-medium tracking-wide rounded-lg transition hover:bg-neutral-700 hover:-translate-y-px active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
          [disabled]="isLoading() || !form.username || !form.password"
        >
          @if (isLoading()) {
            <span
              class="w-4 h-4 rounded-full border-2 border-white/30 border-t-white animate-spin-btn"
            ></span>
            Signing in…
          } @else {
            Sign in
          }
        </button>
      </form>

      <!-- Switch -->
      <p class="text-center text-sm text-neutral-500">
        Don't have an account?
        <a
          routerLink="/register"
          class="font-semibold text-neutral-900 border-b border-neutral-900 hover:opacity-60 transition"
          >Create one</a
        >
      </p>
    </div>
  </div>
</div>
