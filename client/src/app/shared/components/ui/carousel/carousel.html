<swiper-container
  slides-per-view="1.2"
  space-between="16"
  navigation="true"
  pagination="true"
  breakpoints='{
    "640": {"slidesPerView": 2.2, "spaceBetween": 20},
    "1024": {"slidesPerView": 3.5, "spaceBetween": 24}
  }'
  class=""
>
  @for (item of items; track item.name) {
    <swiper-slide>
      <ng-container *ngTemplateOutlet="itemTemplate; context: { $implicit: item }"> </ng-container>
    </swiper-slide>
  }
</swiper-container>
