<section class="mt-16 md:mt-0 px-4 py-16 md:px-8 md:py-24 flex flex-col items-center">
  <h1
    class="text-4xl sm:text-5xl md:text-7xl tracking-tight font-bold text-center mb-16 md:mb-24 leading-none uppercase"
  >
    Follow us <br />
    <span class="italic font-light lowercase tracking-normal">on social media</span>
  </h1>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6 w-full items-center">
    <div class="aspect-[4/5] overflow-hidden group cursor-pointer">
      <img
        src="images/522219350_18318440617235710_2481626241875585642_n.jpg"
        alt="Social feed"
        class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 ease-in-out scale-105 group-hover:scale-100"
      />
    </div>

    <div class="aspect-[4/5] overflow-hidden group cursor-pointer hidden md:block">
      <img
        src="images/522219350_18318440617235710_2481626241875585642_n.jpg"
        alt="Social feed"
        class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 ease-in-out scale-105 group-hover:scale-100"
      />
    </div>

    <div
      class="col-span-2 md:col-span-1 flex flex-col justify-center items-center gap-6 text-center px-4 py-8 order-last md:order-none"
    >
      <p class="text-sm md:text-base uppercase tracking-widest text-gray-500 font-medium">
        Stay tuned
      </p>
      <p class="text-lg md:text-xl font-medium leading-tight">
        Subscribe to our social media to stay updated with all newcomers
      </p>
      <app-link animation="scale" [showIcon]="false" class="w-fit"> @simuero </app-link>
    </div>

    <div class="aspect-[4/5] overflow-hidden group cursor-pointer">
      <img
        src="images/522219350_18318440617235710_2481626241875585642_n.jpg"
        alt="Social feed"
        class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 ease-in-out scale-105 group-hover:scale-100"
      />
    </div>

    <div class="aspect-[4/5] overflow-hidden group cursor-pointer hidden lg:block">
      <img
        src="images/522219350_18318440617235710_2481626241875585642_n.jpg"
        alt="Social feed"
        class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 ease-in-out scale-105 group-hover:scale-100"
      />
    </div>
  </div>
</section>
